<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1923">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SheetViewer">
<title>SheetViewer</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ── TOKENS ─────────────────────────────────────────────── */
  :root {
    --bg:        #0f1923;
    --surface:   #162130;
    --surface2:  #1d2e40;
    --border:    #2a3f55;
    --accent:    #00c2ff;
    --accent2:   #00ffb2;
    --text:      #e8f0f8;
    --text-dim:  #7a9ab8;
    --danger:    #ff4d6d;
    --row-even:  #162130;
    --row-odd:   #0f1923;
    --row-hover: #1e3348;
    --header-bg: #0a1520;
    --radius:    8px;
    --mono:      'DM Mono', monospace;
    --sans:      'Syne', sans-serif;
  }

  /* ── RESET ──────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ────────────────────────────────────────────── */
  #topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  #logo {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--accent);
    white-space: nowrap;
  }
  #logo span { color: var(--accent2); }

  #sheet-select {
    font-family: var(--mono);
    font-size: 0.78rem;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 10px;
    cursor: pointer;
    min-width: 140px;
    max-width: 220px;
  }
  #sheet-select:focus { outline: 2px solid var(--accent); }

  #search-box {
    font-family: var(--mono);
    font-size: 0.78rem;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 10px;
    width: 180px;
    transition: border-color 0.2s;
  }
  #search-box:focus { outline: none; border-color: var(--accent); }
  #search-box::placeholder { color: var(--text-dim); }

  #refresh-btn {
    font-family: var(--sans);
    font-size: 0.75rem;
    font-weight: 600;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 6px 12px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
    margin-left: auto;
  }
  #refresh-btn:hover { background: var(--accent); color: var(--bg); }
  #refresh-btn:active { opacity: 0.8; }

  #status-bar {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-dim);
    white-space: nowrap;
  }

  /* ── FILTER ROW ─────────────────────────────────────────── */
  #filter-row-wrap {
    flex-shrink: 0;
    overflow-x: auto;
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
  }
  #filter-row {
    display: flex;
    gap: 4px;
    padding: 6px 8px;
    min-width: max-content;
  }
  .col-filter {
    font-family: var(--mono);
    font-size: 0.68rem;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 6px;
    min-width: 80px;
    max-width: 140px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .col-filter:focus { outline: none; border-color: var(--accent2); }
  .col-filter.active { border-color: var(--accent2); background: #0d2a1e; }

  /* ── TABLE CONTAINER ────────────────────────────────────── */
  #table-wrap {
    flex: 1;
    overflow: auto;
    position: relative;
  }

  /* ── TABLE ──────────────────────────────────────────────── */
  #data-table {
    border-collapse: collapse;
    width: max-content;
    min-width: 100%;
    font-size: 0.75rem;
    font-family: var(--mono);
  }

  #data-table thead {
    position: sticky;
    top: 0;
    z-index: 10;
  }
  #data-table thead th {
    background: var(--header-bg);
    color: var(--accent);
    font-family: var(--sans);
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 8px 12px;
    border-right: 1px solid var(--border);
    border-bottom: 2px solid var(--accent);
    white-space: nowrap;
    text-align: left;
    user-select: none;
  }
  #data-table thead th:first-child {
    /* Row number column */
    color: var(--text-dim);
    min-width: 44px;
    text-align: center;
  }

  #data-table tbody tr:nth-child(even) { background: var(--row-even); }
  #data-table tbody tr:nth-child(odd)  { background: var(--row-odd); }
  #data-table tbody tr:hover           { background: var(--row-hover); }
  #data-table tbody tr.hidden          { display: none; }

  #data-table tbody td {
    padding: 6px 12px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid #1a2d3f;
    white-space: nowrap;
    color: var(--text);
    max-width: 260px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #data-table tbody td:first-child {
    color: var(--text-dim);
    text-align: center;
    font-size: 0.65rem;
    border-right: 2px solid var(--border);
    min-width: 44px;
  }
  #data-table tbody td.match-highlight {
    color: var(--accent2);
  }

  /* ── STATES ─────────────────────────────────────────────── */
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: var(--bg);
    z-index: 20;
  }
  #overlay.hidden { display: none; }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .overlay-msg {
    font-family: var(--mono);
    font-size: 0.85rem;
    color: var(--text-dim);
    text-align: center;
    max-width: 300px;
    line-height: 1.6;
  }
  .overlay-msg.error { color: var(--danger); }

  #row-count {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-dim);
    padding: 4px 16px;
    flex-shrink: 0;
    background: var(--header-bg);
    border-top: 1px solid var(--border);
    text-align: right;
  }

  /* ── SCROLLBAR ──────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* ── MOBILE TWEAKS ──────────────────────────────────────── */
  @media (max-width: 600px) {
    #topbar { gap: 8px; }
    #search-box { width: 130px; }
    #logo { font-size: 0.95rem; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="logo">Sheet<span>Viewer</span></div>
  <select id="sheet-select" title="Select sheet"></select>
  <input id="search-box" type="search" placeholder="Search all columns…" autocomplete="off">
  <span id="status-bar">—</span>
  <button id="refresh-btn">⟳ Refresh</button>
</div>

<!-- COLUMN FILTER ROW -->
<div id="filter-row-wrap">
  <div id="filter-row"></div>
</div>

<!-- TABLE -->
<div id="table-wrap">
  <div id="overlay">
    <div class="spinner"></div>
    <div class="overlay-msg" id="overlay-msg">Loading spreadsheet…</div>
  </div>
  <table id="data-table">
    <thead><tr id="header-row"></tr></thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<!-- ROW COUNT -->
<div id="row-count" id="row-count-bar">— rows</div>

<!-- ── SCRIPTS ─────────────────────────────────────────────── -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ════════════════════════════════════════════════════════════
//  CONFIGURATION  — edit these two values
// ════════════════════════════════════════════════════════════
const FILE_ID        = '1K1G_hqrCbaaYdpz64auiiZTBSnmfKm7u';
const HIDDEN_SHEETS  = ['_PROCESS_LOG'];   // sheet names to exclude
// ════════════════════════════════════════════════════════════

const FETCH_URL = `https://docs.google.com/spreadsheets/d/${FILE_ID}/export?format=xlsx`;

// ── State ───────────────────────────────────────────────────
let workbook      = null;
let currentSheet  = null;
let allRows       = [];       // [{cells:[], original_index}]
let colFilters    = {};       // col-index → selected value
let searchTerm    = '';
let lastFetched   = null;

// ── DOM refs ────────────────────────────────────────────────
const sheetSelect  = document.getElementById('sheet-select');
const searchBox    = document.getElementById('search-box');
const refreshBtn   = document.getElementById('refresh-btn');
const statusBar    = document.getElementById('status-bar');
const overlay      = document.getElementById('overlay');
const overlayMsg   = document.getElementById('overlay-msg');
const headerRow    = document.getElementById('header-row');
const tableBody    = document.getElementById('table-body');
const filterRow    = document.getElementById('filter-row');
const rowCountBar  = document.getElementById('row-count');

// ── Load workbook ────────────────────────────────────────────
async function loadWorkbook() {
  showOverlay('Loading spreadsheet…');
  statusBar.textContent = '…';
  try {
    const res = await fetch(FETCH_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status} — check that the file is shared publicly.`);
    const buf = await res.arrayBuffer();
    workbook = XLSX.read(buf, { type: 'array', cellDates: true });
    lastFetched = new Date();

    // Populate sheet selector
    const sheets = workbook.SheetNames.filter(n => !HIDDEN_SHEETS.includes(n));
    sheetSelect.innerHTML = '';
    sheets.forEach(n => {
      const opt = document.createElement('option');
      opt.value = opt.textContent = n;
      sheetSelect.appendChild(opt);
    });

    // Restore previously selected sheet if still present
    if (currentSheet && sheets.includes(currentSheet)) {
      sheetSelect.value = currentSheet;
    } else {
      currentSheet = sheets[0] || null;
    }

    renderSheet(currentSheet);
    statusBar.textContent = `Updated ${lastFetched.toLocaleTimeString()}`;
  } catch (err) {
    showOverlay(err.message, true);
    statusBar.textContent = 'Error';
  }
}

// ── Render a sheet ───────────────────────────────────────────
function renderSheet(name) {
  if (!workbook || !name) return;
  currentSheet = name;
  colFilters   = {};
  searchTerm   = searchBox.value = '';

  const ws   = workbook.Sheets[name];
  const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

  if (!data.length) {
    showOverlay('This sheet is empty.');
    return;
  }

  // Determine column count from widest row
  const colCount = Math.max(...data.map(r => r.length));
  const headers  = data[0].map((h, i) => h !== '' ? String(h) : `Col ${i + 1}`);

  // Pad headers if data is wider
  while (headers.length < colCount) headers.push(`Col ${headers.length + 1}`);

  // Build allRows from data rows (skip header row 0)
  allRows = data.slice(1).map((row, i) => {
    const cells = [];
    for (let c = 0; c < colCount; c++) {
      const v = row[c];
      cells.push(v === null || v === undefined ? '' : formatCell(v));
    }
    return { cells, originalIndex: i + 2 }; // +2: 1-based + skip header
  });

  buildHeader(headers);
  buildColFilters(headers);
  buildColFilterOptions();
  applyFilters();
  hideOverlay();
}

function formatCell(v) {
  if (v instanceof Date) {
    return v.toLocaleDateString();
  }
  return String(v);
}

// ── Build header ─────────────────────────────────────────────
function buildHeader(headers) {
  headerRow.innerHTML = '<th>#</th>';
  headers.forEach(h => {
    const th = document.createElement('th');
    th.textContent = h;
    th.title = h;
    headerRow.appendChild(th);
  });
}

// ── Build column filter dropdowns ────────────────────────────
function buildColFilters(headers) {
  filterRow.innerHTML = '';
  // Placeholder for row number column
  const placeholder = document.createElement('div');
  placeholder.style.minWidth = '44px';
  filterRow.appendChild(placeholder);

  headers.forEach((h, i) => {
    const sel = document.createElement('select');
    sel.className = 'col-filter';
    sel.title = `Filter: ${h}`;
    sel.dataset.col = i;
    sel.innerHTML = `<option value="">▾ ${h}</option>`;
    sel.addEventListener('change', () => {
      colFilters[i] = sel.value;
      sel.classList.toggle('active', sel.value !== '');
      applyFilters();
    });
    filterRow.appendChild(sel);
  });
}

// ── Populate column filter options from actual data ──────────
function buildColFilterOptions() {
  const selects = filterRow.querySelectorAll('.col-filter');
  selects.forEach(sel => {
    const ci = parseInt(sel.dataset.col);
    const header = sel.querySelector('option').textContent;
    const unique = [...new Set(allRows.map(r => r.cells[ci]).filter(v => v !== ''))].sort();
    sel.innerHTML = `<option value="">▾ ${header.slice(2)}</option>`;
    unique.forEach(v => {
      const opt = document.createElement('option');
      opt.value = opt.textContent = v;
      sel.appendChild(opt);
    });
  });
}

// ── Apply search + column filters ────────────────────────────
function applyFilters() {
  const term   = searchTerm.toLowerCase().trim();
  const rows   = tableBody.querySelectorAll('tr');
  let visible  = 0;

  allRows.forEach((row, ri) => {
    const tr = rows[ri];
    if (!tr) return;

    // Column filter check
    const passCol = Object.entries(colFilters).every(([ci, val]) => {
      if (!val) return true;
      return row.cells[parseInt(ci)] === val;
    });

    // Search check — highlight matching cells
    let passSearch = true;
    if (term) {
      passSearch = row.cells.some(c => c.toLowerCase().includes(term));
    }

    const visible_row = passCol && passSearch;
    tr.classList.toggle('hidden', !visible_row);
    if (visible_row) {
      visible++;
      // Highlight matching cells
      const tds = tr.querySelectorAll('td:not(:first-child)');
      tds.forEach((td, i) => {
        td.classList.toggle('match-highlight',
          term !== '' && row.cells[i].toLowerCase().includes(term));
      });
    }
  });

  rowCountBar.textContent = `${visible} of ${allRows.length} rows`;
}

// ── Render table body ─────────────────────────────────────────
// Called once per sheet; filtering just shows/hides rows
function renderRows() {
  tableBody.innerHTML = '';
  allRows.forEach(row => {
    const tr = document.createElement('tr');
    // Row number
    const tdNum = document.createElement('td');
    tdNum.textContent = row.originalIndex;
    tr.appendChild(tdNum);
    row.cells.forEach(val => {
      const td = document.createElement('td');
      td.textContent = val;
      td.title = val;
      tr.appendChild(td);
    });
    tableBody.appendChild(tr);
  });
}

// ── Overlay helpers ──────────────────────────────────────────
function showOverlay(msg, isError = false) {
  overlay.classList.remove('hidden');
  overlayMsg.textContent = msg;
  overlayMsg.className = 'overlay-msg' + (isError ? ' error' : '');
}
function hideOverlay() { overlay.classList.add('hidden'); }

// ── Wire up events ───────────────────────────────────────────
sheetSelect.addEventListener('change', () => renderSheet(sheetSelect.value));

searchBox.addEventListener('input', () => {
  searchTerm = searchBox.value;
  applyFilters();
});

refreshBtn.addEventListener('click', loadWorkbook);

// ── Fix: render rows before filtering ───────────────────────
const _origRenderSheet = renderSheet;

// Patch renderSheet to call renderRows before applyFilters
(function() {
  const orig = renderSheet;
  // Rebuild with renderRows call inserted
  window._renderSheetFull = function(name) {
    if (!workbook || !name) return;
    currentSheet = name;
    colFilters   = {};
    searchTerm   = searchBox.value = '';

    const ws   = workbook.Sheets[name];
    const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

    if (!data.length) { showOverlay('This sheet is empty.'); return; }

    const colCount = Math.max(...data.map(r => r.length));
    const headers  = data[0].map((h, i) => h !== '' ? String(h) : `Col ${i + 1}`);
    while (headers.length < colCount) headers.push(`Col ${headers.length + 1}`);

    allRows = data.slice(1).map((row, i) => {
      const cells = [];
      for (let c = 0; c < colCount; c++) {
        const v = row[c];
        cells.push(v === null || v === undefined ? '' : formatCell(v));
      }
      return { cells, originalIndex: i + 2 };
    });

    buildHeader(headers);
    buildColFilters(headers);
    renderRows();            // ← render DOM rows first
    buildColFilterOptions();
    applyFilters();
    hideOverlay();
  };
})();

// Override sheetSelect handler to use full version
sheetSelect.addEventListener('change', () => window._renderSheetFull(sheetSelect.value), true);
refreshBtn.addEventListener('click', () => {
  // After reload, re-render with full version
  const origLoad = loadWorkbook;
}, true);

// Replace loadWorkbook render call
async function loadWorkbookFull() {
  showOverlay('Loading spreadsheet…');
  statusBar.textContent = '…';
  try {
    const res = await fetch(FETCH_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status} — make sure the file is shared publicly (Anyone with the link).`);
    const buf = await res.arrayBuffer();
    workbook = XLSX.read(buf, { type: 'array', cellDates: true });
    lastFetched = new Date();

    const sheets = workbook.SheetNames.filter(n => !HIDDEN_SHEETS.includes(n));
    sheetSelect.innerHTML = '';
    sheets.forEach(n => {
      const opt = document.createElement('option');
      opt.value = opt.textContent = n;
      sheetSelect.appendChild(opt);
    });

    if (currentSheet && sheets.includes(currentSheet)) {
      sheetSelect.value = currentSheet;
    } else {
      currentSheet = sheets[0] || null;
    }

    window._renderSheetFull(currentSheet);
    statusBar.textContent = `Updated ${lastFetched.toLocaleTimeString()}`;
  } catch (err) {
    showOverlay(err.message, true);
    statusBar.textContent = 'Error';
  }
}

// Wire refresh button to full version
refreshBtn.onclick = loadWorkbookFull;

// ── Kick off ─────────────────────────────────────────────────
loadWorkbookFull();
</script>
</body>
</html>
