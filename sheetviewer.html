<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="RosterView">
<title>RosterView</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0d1117;
  --surface:   #161b22;
  --surface2:  #21262d;
  --border:    #30363d;
  --accent:    #58a6ff;
  --accent2:   #3fb950;
  --text:      #e6edf3;
  --text-dim:  #8b949e;
  --danger:    #f85149;
  --radius:    6px;
  --mono:      'IBM Plex Mono', monospace;
  --sans:      'IBM Plex Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--sans); }

/* ── TOP BAR ───────────────────────────────────────── */
#topbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 12px;
  height: 48px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
  overflow-y: hidden;
}
#topbar::-webkit-scrollbar { height: 0; }

#logo {
  font-family: var(--mono);
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--accent);
  white-space: nowrap;
  flex-shrink: 0;
}

.sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

.tb-label {
  font-size: 0.62rem;
  font-weight: 600;
  color: var(--text-dim);
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.tb-select {
  font-family: var(--mono);
  font-size: 0.72rem;
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 4px 8px;
  cursor: pointer;
  flex-shrink: 0;
  max-width: 160px;
}
.tb-select:focus { outline: none; border-color: var(--accent); }

.tb-input {
  font-family: var(--mono);
  font-size: 0.72rem;
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 4px 8px;
  width: 140px;
  flex-shrink: 0;
  transition: border-color 0.15s;
}
.tb-input:focus { outline: none; border-color: var(--accent2); }
.tb-input::placeholder { color: var(--text-dim); }
.tb-input.active { border-color: var(--accent2); }

.tb-btn {
  font-family: var(--sans);
  font-size: 0.68rem;
  font-weight: 600;
  background: transparent;
  color: var(--accent);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 4px 10px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background 0.15s, border-color 0.15s;
}
.tb-btn:hover { background: var(--surface2); border-color: var(--accent); }

#status-text {
  font-family: var(--mono);
  font-size: 0.62rem;
  color: var(--text-dim);
  white-space: nowrap;
  flex-shrink: 0;
  margin-left: auto;
}

/* ── NAME MATCH PANEL ──────────────────────────────── */
#match-panel {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 4px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text-dim);
  flex-shrink: 0;
}
#match-panel.visible { display: flex; }
#match-list {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  flex: 1;
}
.match-chip {
  background: var(--surface2);
  border: 1px solid var(--accent2);
  border-radius: 4px;
  padding: 2px 8px;
  color: var(--accent2);
  font-size: 0.68rem;
  cursor: pointer;
  transition: background 0.12s;
  white-space: nowrap;
}
.match-chip:hover { background: var(--accent2); color: var(--bg); }
.match-chip.active { background: var(--accent2); color: var(--bg); }
#match-label { color: var(--text-dim); white-space: nowrap; flex-shrink: 0; }

/* ── IFRAME CONTAINER ──────────────────────────────── */
#frame-wrap {
  flex: 1;
  position: relative;
  display: flex;
  flex-direction: column;
}
#sheet-frame {
  flex: 1;
  border: none;
  width: 100%;
}

/* ── OVERLAY ───────────────────────────────────────── */
#overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  background: var(--bg);
  z-index: 10;
}
#overlay.hidden { display: none; }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.overlay-msg {
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--text-dim);
  text-align: center;
  max-width: 300px;
  line-height: 1.6;
}
.overlay-msg.err { color: var(--danger); }

/* ── STATUS BAR ────────────────────────────────────── */
#statusbar {
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  font-family: var(--mono);
  font-size: 0.62rem;
  color: var(--text-dim);
}

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>

<body style="display:flex;flex-direction:column;height:100%">

<!-- TOP BAR -->
<div id="topbar">
  <div id="logo">RosterView</div>
  <div class="sep"></div>

  <span class="tb-label">Sheet</span>
  <select id="sheet-sel" class="tb-select"></select>

  <div class="sep"></div>
  <span class="tb-label">Find person</span>
  <input id="name-input" class="tb-input" type="search"
         placeholder="Type a name…" autocomplete="off" list="name-list">
  <datalist id="name-list"></datalist>

  <button id="prev-btn" class="tb-btn" title="Previous match">▲</button>
  <button id="next-btn" class="tb-btn" title="Next match">▼</button>
  <button id="clear-btn" class="tb-btn" title="Clear search">✕</button>

  <div class="sep"></div>
  <button id="refresh-btn" class="tb-btn">⟳ Refresh</button>
  <span id="status-text">—</span>
</div>

<!-- MATCH CHIPS PANEL -->
<div id="match-panel">
  <span id="match-label">Matches:</span>
  <div id="match-list"></div>
</div>

<!-- IFRAME + OVERLAY -->
<div id="frame-wrap">
  <div id="overlay">
    <div class="spinner"></div>
    <div class="overlay-msg" id="overlay-msg">Loading roster…</div>
  </div>
  <iframe id="sheet-frame" allowfullscreen></iframe>
</div>

<!-- STATUS BAR -->
<div id="statusbar">
  <span id="left-status">—</span>
  <span id="right-status">—</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ════════════════════════════════════════════════════
//  CONFIGURATION
// ════════════════════════════════════════════════════
const FILE_ID       = '1K1G_hqrCbaaYdpz64auiiZTBSnmfKm7u';
const HIDDEN_SHEETS = ['_PROCESS_LOG'];
const NAMES_ROW     = 15;    // 1-based row where person names start
const NAMES_COL     = 'D';   // column letter containing person names
const MAX_ROW       = 55;    // stop reading data beyond this row
// ════════════════════════════════════════════════════

const FETCH_URL   = `https://docs.google.com/spreadsheets/d/${FILE_ID}/export?format=xlsx`;
const NAMES_COL_0 = NAMES_COL.toUpperCase().charCodeAt(0) - 65; // 0-based

// Google Sheets preview URL for the iframe — gid is the sheet's numeric id
// We build per-sheet URLs using the gid once we know them
const GS_BASE = `https://docs.google.com/spreadsheets/d/${FILE_ID}/preview`;

// ── State ────────────────────────────────────────────
let workbook      = null;
let sheetMeta     = [];     // [{name, gid, names:[]}]
let currentIdx    = 0;
let matches       = [];     // names matching current search
let activeMatch   = -1;

// ── DOM ──────────────────────────────────────────────
const sheetSel   = document.getElementById('sheet-sel');
const nameInput  = document.getElementById('name-input');
const nameList   = document.getElementById('name-list');
const prevBtn    = document.getElementById('prev-btn');
const nextBtn    = document.getElementById('next-btn');
const clearBtn   = document.getElementById('clear-btn');
const refreshBtn = document.getElementById('refresh-btn');
const statusText = document.getElementById('status-text');
const matchPanel = document.getElementById('match-panel');
const matchList  = document.getElementById('match-list');
const matchLabel = document.getElementById('match-label');
const frame      = document.getElementById('sheet-frame');
const overlay    = document.getElementById('overlay');
const overlayMsg = document.getElementById('overlay-msg');
const leftStatus = document.getElementById('left-status');
const rightStatus= document.getElementById('right-status');

function showOverlay(msg, err=false) {
  overlay.classList.remove('hidden');
  overlayMsg.textContent = msg;
  overlayMsg.className = 'overlay-msg' + (err ? ' err' : '');
}
function hideOverlay() { overlay.classList.add('hidden'); }

// ── Load workbook (xlsx for name extraction only) ────
async function loadWorkbook() {
  showOverlay('Loading roster…');
  statusText.textContent = '…';
  try {
    const res = await fetch(FETCH_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error(
      `HTTP ${res.status} — check the file is shared publicly.`);
    const buf = await res.arrayBuffer();
    workbook = XLSX.read(buf, { type: 'array', cellDates: false });

    // Extract sheet names, gids and person names
    sheetMeta = [];
    workbook.SheetNames.forEach((name, i) => {
      if (HIDDEN_SHEETS.includes(name)) return;
      const ws = workbook.Sheets[name];

      // gid: SheetJS stores it in ws['!id'] or we fall back to index
      const gid = (ws['!id'] !== undefined) ? ws['!id'] : i;

      // Extract names from NAMES_COL, rows NAMES_ROW..MAX_ROW
      const range = ws['!ref'] ? XLSX.utils.decode_range(ws['!ref']) : null;
      const names = [];
      if (range) {
        for (let r = NAMES_ROW - 1; r < Math.min(MAX_ROW, range.e.r + 1); r++) {
          const addr = XLSX.utils.encode_cell({ r, c: NAMES_COL_0 });
          const cell = ws[addr];
          if (cell && cell.v !== undefined && cell.v !== '') {
            const val = String(cell.v).trim();
            if (val) names.push({ name: val, row: r }); // row is 0-based
          }
        }
      }

      sheetMeta.push({ name, gid, names });
    });

    // Populate sheet dropdown
    sheetSel.innerHTML = '';
    sheetMeta.forEach((s, i) => {
      const o = document.createElement('option');
      o.value = i;
      o.textContent = s.name;
      sheetSel.appendChild(o);
    });

    // Restore last sheet
    const saved = localStorage.getItem('rv_sheet');
    if (saved !== null && saved < sheetMeta.length) {
      currentIdx = parseInt(saved);
      sheetSel.value = currentIdx;
    } else {
      currentIdx = 0;
    }

    switchSheet(currentIdx);
    statusText.textContent = `${sheetMeta.length} sheets · ${new Date().toLocaleTimeString()}`;
  } catch(err) {
    showOverlay(err.message, true);
    statusText.textContent = 'Error';
  }
}

// ── Switch sheet in iframe ───────────────────────────
function switchSheet(idx) {
  currentIdx = idx;
  const s = sheetMeta[idx];
  if (!s) return;

  localStorage.setItem('rv_sheet', idx);
  clearSearch();

  // Populate name autocomplete for this sheet
  nameList.innerHTML = '';
  const seen = new Set();
  s.names.forEach(({ name }) => {
    if (!seen.has(name)) {
      seen.add(name);
      const opt = document.createElement('option');
      opt.value = name;
      nameList.appendChild(opt);
    }
  });

  // Load sheet in iframe using Google Sheets preview with gid
  const url = `${GS_BASE}?gid=${s.gid}`;
  frame.src = url;
  showOverlay(`Opening ${s.name}…`);
  leftStatus.textContent = s.name;
  rightStatus.textContent = `${s.names.length} people`;

  frame.onload = () => hideOverlay();
  // Fallback hide after 8s in case onload doesn't fire
  setTimeout(() => hideOverlay(), 8000);
}

// ── Search / match logic ─────────────────────────────
function doSearch() {
  const term = nameInput.value.trim().toLowerCase();
  nameInput.classList.toggle('active', term.length > 0);

  if (!term) { clearSearch(); return; }

  const s = sheetMeta[currentIdx];
  const seen = new Set();
  matches = [];
  s.names.forEach(entry => {
    if (entry.name.toLowerCase().includes(term) && !seen.has(entry.name)) {
      seen.add(entry.name);
      matches.push(entry);
    }
  });

  // Build chips
  matchList.innerHTML = '';
  if (matches.length === 0) {
    matchPanel.classList.add('visible');
    matchLabel.textContent = 'No match';
    return;
  }

  matchPanel.classList.add('visible');
  matchLabel.textContent = `${matches.length} match${matches.length > 1 ? 'es' : ''}:`;
  matches.forEach((m, i) => {
    const chip = document.createElement('button');
    chip.className = 'match-chip';
    chip.textContent = m.name;
    chip.addEventListener('click', () => activateMatch(i));
    matchList.appendChild(chip);
  });

  // Auto-activate first match
  activateMatch(0);
}

function activateMatch(i) {
  if (i < 0 || i >= matches.length) return;
  activeMatch = i;

  // Update chip highlight
  matchList.querySelectorAll('.match-chip').forEach((c, ci) =>
    c.classList.toggle('active', ci === i));

  // Navigate iframe to the row
  // Google Sheets preview supports #gid=X&range=A1 style anchors
  const s = sheetMeta[currentIdx];
  const m = matches[i];
  const rowNum = m.row + 1; // convert 0-based to 1-based
  const rangeStr = `${NAMES_COL}${rowNum}`;
  frame.src = `${GS_BASE}?gid=${s.gid}&range=${rangeStr}`;
  showOverlay(`Navigating to ${m.name}…`);
  frame.onload = () => hideOverlay();
  setTimeout(() => hideOverlay(), 5000);

  leftStatus.textContent = `${s.name} — row ${rowNum}: ${m.name}`;
}

function clearSearch() {
  nameInput.value = '';
  nameInput.classList.remove('active');
  matches = [];
  activeMatch = -1;
  matchPanel.classList.remove('visible');
  matchList.innerHTML = '';
  matchLabel.textContent = 'Matches:';
}

// ── Navigation buttons ───────────────────────────────
prevBtn.addEventListener('click', () => {
  if (matches.length === 0) return;
  activateMatch((activeMatch - 1 + matches.length) % matches.length);
});
nextBtn.addEventListener('click', () => {
  if (matches.length === 0) return;
  activateMatch((activeMatch + 1) % matches.length);
});
clearBtn.addEventListener('click', () => {
  clearSearch();
  // Reload current sheet without range anchor
  switchSheet(currentIdx);
});

// ── Sheet selector ───────────────────────────────────
sheetSel.addEventListener('change', () => switchSheet(parseInt(sheetSel.value)));

// ── Search input ─────────────────────────────────────
nameInput.addEventListener('input', doSearch);
nameInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    if (matches.length > 0) activateMatch((activeMatch + 1) % matches.length);
  }
});

// ── Refresh ──────────────────────────────────────────
refreshBtn.addEventListener('click', loadWorkbook);

// ── Service worker ────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ── Boot ─────────────────────────────────────────────
loadWorkbook();
</script>
</body>
</html>
