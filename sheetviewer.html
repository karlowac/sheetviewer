<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1f2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="RosterView">
<title>RosterView</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── DARK THEME TOKENS ─────────────────────────────────── */
:root {
  --bg:           #0d1117;
  --surface:      #161b22;
  --surface2:     #21262d;
  --border:       #30363d;
  --accent:       #58a6ff;
  --accent2:      #3fb950;
  --text:         #e6edf3;
  --text-dim:     #8b949e;
  --danger:       #f85149;
  --row-even:     #161b22;
  --row-odd:      #0d1117;
  --row-hover:    #1f2937;
  --header-bg:    #090d13;
  --frozen-bg:    #1c2333;
  --frozen-head:  #131820;
  --radius:       6px;
  --mono:         'IBM Plex Mono', monospace;
  --sans:         'IBM Plex Sans', sans-serif;
  --topbar-h:     48px;
  --filterbar-h:  36px;
  --statusbar-h:  26px;
}

/* ── EXCEL (LIGHT) THEME OVERRIDES ─────────────────────── */
body.excel-theme {
  --bg:           #ffffff;
  --surface:      #f3f3f3;
  --surface2:     #e8e8e8;
  --border:       #d0d0d0;
  --accent:       #217346;
  --accent2:      #2a6099;
  --text:         #000000;
  --text-dim:     #595959;
  --row-even:     #ffffff;
  --row-odd:      #f9f9f9;
  --row-hover:    #e8f4e8;
  --header-bg:    #f3f3f3;
  --frozen-bg:    #f3f3f3;
  --frozen-head:  #e8e8e8;
}

/* ── RESET ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  transition: background 0.25s, color 0.25s;
}

/* ── TOP BAR ───────────────────────────────────────────── */
#topbar {
  height: var(--topbar-h);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 12px;
  background: var(--header-bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
  overflow-y: hidden;
}
#topbar::-webkit-scrollbar { height: 0; }

#logo {
  font-family: var(--mono);
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--accent);
  white-space: nowrap;
  margin-right: 4px;
  flex-shrink: 0;
}

.tb-sep {
  width: 1px;
  height: 20px;
  background: var(--border);
  flex-shrink: 0;
}

.tb-label {
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--text-dim);
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.tb-select {
  font-family: var(--mono);
  font-size: 0.72rem;
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 4px 8px;
  cursor: pointer;
  flex-shrink: 0;
  max-width: 180px;
  transition: border-color 0.15s;
}
.tb-select:focus { outline: none; border-color: var(--accent); }

.tb-input {
  font-family: var(--mono);
  font-size: 0.72rem;
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 4px 8px;
  width: 150px;
  flex-shrink: 0;
  transition: border-color 0.15s;
}
.tb-input:focus { outline: none; border-color: var(--accent); }
.tb-input::placeholder { color: var(--text-dim); }

.tb-btn {
  font-family: var(--sans);
  font-size: 0.7rem;
  font-weight: 600;
  background: transparent;
  color: var(--accent);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 4px 10px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.tb-btn:hover { background: var(--surface2); border-color: var(--accent); }
.tb-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

#status-text {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text-dim);
  white-space: nowrap;
  flex-shrink: 0;
  margin-left: auto;
}

/* ── TABLE WRAP ────────────────────────────────────────── */
#table-outer {
  flex: 1;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
}

/* The scrollable viewport */
#table-scroll {
  flex: 1;
  overflow: auto;
  position: relative;
}

/* ── TABLE ─────────────────────────────────────────────── */
#data-table {
  border-collapse: collapse;
  table-layout: fixed;
  font-size: 0.72rem;
  font-family: var(--mono);
}

/* Default (unstyled by Excel) cells */
#data-table td, #data-table th {
  border: 1px solid var(--border);
  padding: 3px 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 60px;
  max-width: 180px;
  vertical-align: middle;
  transition: background 0.2s;
}

/* Excel-styled cells override the theme border with their own */
body.excel-theme #data-table td,
body.excel-theme #data-table th {
  border-color: #d0d0d0;
}

/* Sticky header row */
#data-table thead tr th {
  position: sticky;
  top: 0;
  z-index: 4;
  background: var(--header-bg);
  font-family: var(--sans);
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--text-dim);
  letter-spacing: 0.04em;
  text-align: center;
}

/* Row number column header */
#data-table thead tr th:first-child {
  z-index: 6;
  min-width: 36px;
  max-width: 36px;
  width: 36px;
}

/* Row number cells */
#data-table tbody td:first-child {
  color: var(--text-dim);
  font-size: 0.6rem;
  text-align: center;
  background: var(--surface);
  min-width: 36px;
  max-width: 36px;
  width: 36px;
  border-right: 2px solid var(--border);
}

/* Hover rows */
#data-table tbody tr:hover td:not(.frozen-cell) {
  background: var(--row-hover) !important;
}

/* Hidden rows */
#data-table tbody tr.row-hidden { display: none; }

/* Frozen column cells */
.frozen-cell {
  position: sticky;
  z-index: 3;
  background: var(--frozen-bg) !important;
}
.frozen-cell.head-cell {
  z-index: 7 !important;
  background: var(--frozen-head) !important;
}
/* Shadow on frozen column */
.frozen-cell::after {
  content: '';
  position: absolute;
  right: -6px;
  top: 0; bottom: 0;
  width: 6px;
  background: linear-gradient(to right, rgba(0,0,0,0.18), transparent);
  pointer-events: none;
}

/* Status bar */
#statusbar {
  height: var(--statusbar-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  background: var(--header-bg);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text-dim);
}

/* ── OVERLAY ───────────────────────────────────────────── */
#overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  background: var(--bg);
  z-index: 30;
}
#overlay.hidden { display: none; }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.overlay-msg {
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--text-dim);
  text-align: center;
  max-width: 320px;
  line-height: 1.6;
}
.overlay-msg.err { color: var(--danger); }

/* ── SCROLLBARS ────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* ── PERSON HIGHLIGHT ──────────────────────────────────── */
tr.person-match td { outline: 1px solid var(--accent2); }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="logo">RosterView</div>
  <div class="tb-sep"></div>

  <span class="tb-label">Sheet</span>
  <select id="sheet-sel" class="tb-select" title="Select month sheet"></select>

  <div class="tb-sep"></div>
  <span class="tb-label">Person</span>
  <input id="person-filter" class="tb-input" type="search"
         placeholder="Filter by name…" autocomplete="off" list="person-list">
  <datalist id="person-list"></datalist>

  <div class="tb-sep"></div>
  <span class="tb-label">Freeze col</span>
  <select id="freeze-sel" class="tb-select" title="Freeze column"></select>

  <div class="tb-sep"></div>
  <button id="theme-btn" class="tb-btn" title="Toggle theme">☀ Excel view</button>
  <button id="refresh-btn" class="tb-btn" title="Refresh data">⟳ Refresh</button>

  <span id="status-text">—</span>
</div>

<!-- TABLE AREA -->
<div id="table-outer">
  <div id="overlay">
    <div class="spinner"></div>
    <div class="overlay-msg" id="overlay-msg">Loading roster…</div>
  </div>
  <div id="table-scroll">
    <table id="data-table">
      <thead><tr id="col-header"></tr></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

<!-- STATUS BAR -->
<div id="statusbar">
  <span id="row-info">—</span>
  <span id="last-update">—</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ════════════════════════════════════════════════════════
//  CONFIGURATION  — adjust these to match your file
// ════════════════════════════════════════════════════════
const FILE_ID       = '1K1G_hqrCbaaYdpz64auiiZTBSnmfKm7u';
const HIDDEN_SHEETS = ['_PROCESS_LOG'];

// Row (1-based) where person names appear in each sheet
const NAMES_ROW     = 15;
// Column letter where person names appear (e.g. 'A' or 'B')
const NAMES_COL     = 'A';
// ════════════════════════════════════════════════════════

const FETCH_URL = `https://docs.google.com/spreadsheets/d/${FILE_ID}/export?format=xlsx`;
const NAMES_COL_IDX = NAMES_COL.toUpperCase().charCodeAt(0) - 65; // 0-based

// ── State ────────────────────────────────────────────────
let workbook      = null;
let sheetData     = null;   // { headers, rows, merges, colStyles }
let currentSheet  = null;
let frozenColIdx  = -1;     // 0-based data col index (-1 = none)
let personFilter  = '';
let excelTheme    = false;
let lastFetched   = null;

// ── DOM ──────────────────────────────────────────────────
const sheetSel     = document.getElementById('sheet-sel');
const personInput  = document.getElementById('person-filter');
const personList   = document.getElementById('person-list');
const freezeSel    = document.getElementById('freeze-sel');
const themeBtn     = document.getElementById('theme-btn');
const refreshBtn   = document.getElementById('refresh-btn');
const statusText   = document.getElementById('status-text');
const overlay      = document.getElementById('overlay');
const overlayMsg   = document.getElementById('overlay-msg');
const colHeader    = document.getElementById('col-header');
const tableBody    = document.getElementById('table-body');
const rowInfo      = document.getElementById('row-info');
const lastUpdate   = document.getElementById('last-update');

// ── Helpers ──────────────────────────────────────────────
function showOverlay(msg, isErr=false) {
  overlay.classList.remove('hidden');
  overlayMsg.textContent = msg;
  overlayMsg.className = 'overlay-msg' + (isErr ? ' err' : '');
}
function hideOverlay() { overlay.classList.add('hidden'); }

function colLetter(n) {   // 0-based → 'A','B',...,'Z','AA',...
  let s = '';
  n++;
  while (n > 0) { n--; s = String.fromCharCode(65 + n%26) + s; n = Math.floor(n/26); }
  return s;
}

function parseColor(c) {
  if (!c) return null;
  if (c.type === 'rgb' && c.rgb && c.rgb !== '00000000' && c.rgb !== 'FF000000') {
    const rgb = c.rgb.slice(-6);          // strip alpha
    if (rgb === '000000') return null;    // default black → let theme handle
    return '#' + rgb;
  }
  return null;
}

function cellAddress(r, c) {
  return colLetter(c) + (r + 1);
}

// ── Load workbook ─────────────────────────────────────────
async function loadWorkbook() {
  showOverlay('Loading roster…');
  statusText.textContent = '…';
  try {
    const res = await fetch(FETCH_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error(
      `HTTP ${res.status} — make sure the file is shared publicly (Anyone with the link).`);
    const buf = await res.arrayBuffer();
    workbook = XLSX.read(buf, {
      type: 'array',
      cellDates: true,
      cellStyles: true,
      cellNF: true
    });
    lastFetched = new Date();

    // Populate sheet selector
    const sheets = workbook.SheetNames.filter(n => !HIDDEN_SHEETS.includes(n));
    sheetSel.innerHTML = '';
    sheets.forEach(n => {
      const o = document.createElement('option');
      o.value = o.textContent = n;
      sheetSel.appendChild(o);
    });

    if (currentSheet && sheets.includes(currentSheet)) {
      sheetSel.value = currentSheet;
    } else {
      currentSheet = sheets[0] || null;
    }

    renderSheet(currentSheet);
    lastUpdate.textContent = `Updated ${lastFetched.toLocaleTimeString()}`;
    statusText.textContent = `${sheets.length} sheets`;
  } catch(err) {
    showOverlay(err.message, true);
    statusText.textContent = 'Error';
  }
}

// ── Parse sheet data ──────────────────────────────────────
function parseSheet(name) {
  const ws = workbook.Sheets[name];
  if (!ws) return null;

  const range = XLSX.utils.decode_range(ws['!ref'] || 'A1');
  const nRows = range.e.r - range.s.r + 1;
  const nCols = range.e.c - range.s.c + 1;
  const startR = range.s.r;
  const startC = range.s.c;

  // Build rows array: each row = array of {value, style}
  const rows = [];
  for (let r = 0; r < nRows; r++) {
    const row = [];
    for (let c = 0; c < nCols; c++) {
      const addr = XLSX.utils.encode_cell({ r: r + startR, c: c + startC });
      const cell = ws[addr];
      let val = '';
      if (cell) {
        if (cell.t === 'd' && cell.v instanceof Date) {
          val = cell.v.toLocaleDateString();
        } else if (cell.w !== undefined) {
          val = cell.w;
        } else if (cell.v !== undefined) {
          val = String(cell.v);
        }
      }
      const s = cell && cell.s ? cell.s : null;
      row.push({ value: val, style: s });
    }
    rows.push(row);
  }

  // Parse merges
  const merges = (ws['!merges'] || []).map(m => ({
    rs: m.s.r - startR, re: m.e.r - startR,
    cs: m.s.c - startC, ce: m.e.c - startC
  }));

  // Column widths from sheet (wch = width in chars)
  const colWidths = [];
  const colInfo = ws['!cols'] || [];
  for (let c = 0; c < nCols; c++) {
    const ci = colInfo[c + startC];
    colWidths.push(ci && ci.wch ? Math.max(40, Math.min(200, ci.wch * 7)) : 70);
  }

  return { rows, merges, nRows, nCols, startR, startC, colWidths };
}

// ── Build style string from cell style object ─────────────
function buildStyle(s, isExcel) {
  if (!s || !isExcel) return '';
  const parts = [];

  // Background fill
  if (s.fgColor) {
    const bg = parseColor(s.fgColor);
    if (bg) parts.push(`background:${bg}`);
  } else if (s.bgColor) {
    const bg = parseColor(s.bgColor);
    if (bg) parts.push(`background:${bg}`);
  }
  if (s.patternType && s.patternType !== 'none' && s.patternType !== 'solid') {
    // skip pattern fills that aren't solid
  }

  // Font
  if (s.bold)   parts.push('font-weight:700');
  if (s.italic) parts.push('font-style:italic');
  if (s.color) {
    const fc = parseColor(s.color);
    if (fc) parts.push(`color:${fc}`);
  }

  // Alignment
  if (s.alignment) {
    if (s.alignment.horizontal) {
      const map = { center:'center', right:'right', left:'left', general:'left' };
      parts.push(`text-align:${map[s.alignment.horizontal] || 'left'}`);
    }
    if (s.alignment.wrapText) parts.push('white-space:normal');
  }

  // Borders — only in excel theme
  const bd = s.border || s.borders;
  if (bd) {
    ['top','bottom','left','right'].forEach(side => {
      const b = bd[side];
      if (b && b.style && b.style !== 'none') {
        const w = b.style === 'thin' ? '1px' :
                  b.style === 'medium' ? '2px' :
                  b.style === 'thick' ? '3px' : '1px';
        const bc = b.color ? (parseColor(b.color) || '#000') : '#000';
        parts.push(`border-${side}:${w} solid ${bc}`);
      }
    });
  }

  return parts.join(';');
}

// ── Render sheet ──────────────────────────────────────────
function renderSheet(name) {
  if (!workbook || !name) return;
  currentSheet = name;
  personInput.value = '';
  personFilter = '';

  const parsed = parseSheet(name);
  if (!parsed) { showOverlay('Could not parse sheet.', true); return; }
  sheetData = parsed;

  // Build column header row (col letters)
  colHeader.innerHTML = '<th style="min-width:36px;max-width:36px;width:36px"></th>';
  for (let c = 0; c < parsed.nCols; c++) {
    const th = document.createElement('th');
    th.textContent = colLetter(parsed.startC + c);
    th.style.width = parsed.colWidths[c] + 'px';
    th.style.minWidth = parsed.colWidths[c] + 'px';
    if (c === frozenColIdx) {
      th.classList.add('frozen-cell', 'head-cell');
      th.style.left = (36) + 'px';   // account for row-number col
    }
    colHeader.appendChild(th);
  }

  // Build merge lookup: "r,c" → {rowspan, colspan} or null (spanned)
  const mergeMap = {};
  const spanned  = new Set();
  parsed.merges.forEach(m => {
    mergeMap[`${m.rs},${m.cs}`] = { rowspan: m.re-m.rs+1, colspan: m.ce-m.cs+1 };
    for (let r2 = m.rs; r2 <= m.re; r2++) {
      for (let c2 = m.cs; c2 <= m.ce; c2++) {
        if (r2 !== m.rs || c2 !== m.cs) spanned.add(`${r2},${c2}`);
      }
    }
  });

  // Build freeze dropdown
  freezeSel.innerHTML = '<option value="-1">None</option>';
  for (let c = 0; c < parsed.nCols; c++) {
    const o = document.createElement('option');
    o.value = c;
    o.textContent = colLetter(parsed.startC + c);
    freezeSel.appendChild(o);
  }
  freezeSel.value = frozenColIdx;

  // Build names datalist for autocomplete
  personList.innerHTML = '';
  const nameColInParsed = NAMES_COL_IDX - parsed.startC;
  const names = new Set();
  parsed.rows.forEach((row, ri) => {
    const absRow = ri + parsed.startR;
    if (absRow >= NAMES_ROW - 1) {
      const cell = row[nameColInParsed];
      if (cell && cell.value.trim()) names.add(cell.value.trim());
    }
  });
  names.forEach(n => {
    const opt = document.createElement('option');
    opt.value = n;
    personList.appendChild(opt);
  });

  // Render table body
  tableBody.innerHTML = '';
  const isExcel = excelTheme;

  // Calculate frozen col left offset
  const frozenLeft = 36; // row number col width

  parsed.rows.forEach((row, ri) => {
    const absRow = ri + parsed.startR;
    const tr = document.createElement('tr');
    tr.dataset.row = ri;

    // Row number cell
    const tdNum = document.createElement('td');
    tdNum.textContent = absRow + 1;
    tdNum.style.cssText = 'position:sticky;left:0;z-index:2;';
    tr.appendChild(tdNum);

    row.forEach((cell, ci) => {
      const key = `${ri},${ci}`;
      if (spanned.has(key)) return;  // skip spanned cells

      const td = document.createElement('td');
      td.textContent = cell.value;
      td.title = cell.value;

      // Merge
      const mg = mergeMap[key];
      if (mg) {
        if (mg.rowspan > 1) td.rowSpan = mg.rowspan;
        if (mg.colspan > 1) td.colSpan = mg.colspan;
      }

      // Width
      td.style.width = parsed.colWidths[ci] + 'px';
      td.style.minWidth = parsed.colWidths[ci] + 'px';

      // Excel style
      const styleStr = buildStyle(cell.style, isExcel);
      if (styleStr) td.style.cssText += ';' + styleStr;

      // Frozen column
      if (ci === frozenColIdx) {
        td.classList.add('frozen-cell');
        td.style.left = frozenLeft + 'px';
        td.style.zIndex = 3;
      }

      tr.appendChild(td);
    });

    tableBody.appendChild(tr);
  });

  applyPersonFilter();
  updateFreezePositions();
  hideOverlay();
}

// ── Apply person filter ───────────────────────────────────
function applyPersonFilter() {
  if (!sheetData) return;
  const term = personFilter.toLowerCase().trim();
  const rows = tableBody.querySelectorAll('tr');
  const nameColInParsed = NAMES_COL_IDX - sheetData.startC;
  let visible = 0, total = 0;

  rows.forEach((tr, ri) => {
    const row = sheetData.rows[ri];
    if (!row) return;
    total++;

    if (!term) {
      tr.classList.remove('row-hidden', 'person-match');
      visible++;
      return;
    }

    const nameCell = row[nameColInParsed];
    const nameVal  = nameCell ? nameCell.value.toLowerCase() : '';
    const match    = nameVal.includes(term);

    tr.classList.toggle('row-hidden', !match);
    tr.classList.toggle('person-match', match);
    if (match) visible++;
  });

  rowInfo.textContent = term
    ? `${visible} of ${total} rows (filtered by name)`
    : `${total} rows · ${sheetData.nCols} columns`;
}

// ── Update frozen column positions ────────────────────────
function updateFreezePositions() {
  // Remove all existing frozen styles
  tableBody.querySelectorAll('.frozen-cell').forEach(el => {
    el.classList.remove('frozen-cell');
    el.style.left = '';
    el.style.zIndex = '';
  });
  colHeader.querySelectorAll('.frozen-cell').forEach(el => {
    el.classList.remove('frozen-cell', 'head-cell');
    el.style.left = '';
  });

  if (frozenColIdx < 0) return;

  const frozenLeft = 36;  // row-number col

  // Header
  const ths = colHeader.querySelectorAll('th');
  // +1 because first th is row-number
  const fth = ths[frozenColIdx + 1];
  if (fth) {
    fth.classList.add('frozen-cell', 'head-cell');
    fth.style.left = frozenLeft + 'px';
  }

  // Body rows
  tableBody.querySelectorAll('tr').forEach(tr => {
    const tds = tr.querySelectorAll('td');
    // +1 for row-number td
    const ftd = tds[frozenColIdx + 1];
    if (ftd) {
      ftd.classList.add('frozen-cell');
      ftd.style.left = frozenLeft + 'px';
      ftd.style.zIndex = 3;
    }
  });
}

// ── Theme toggle ──────────────────────────────────────────
function toggleTheme() {
  excelTheme = !excelTheme;
  document.body.classList.toggle('excel-theme', excelTheme);
  themeBtn.textContent = excelTheme ? '🌙 Dark view' : '☀ Excel view';
  themeBtn.classList.toggle('active', excelTheme);
  localStorage.setItem('rv_theme', excelTheme ? '1' : '0');
  // Re-render to apply/remove Excel styles
  if (currentSheet) renderSheet(currentSheet);
}

// ── Events ────────────────────────────────────────────────
sheetSel.addEventListener('change', () => renderSheet(sheetSel.value));

personInput.addEventListener('input', () => {
  personFilter = personInput.value;
  applyPersonFilter();
});

freezeSel.addEventListener('change', () => {
  frozenColIdx = parseInt(freezeSel.value);
  updateFreezePositions();
});

themeBtn.addEventListener('click', toggleTheme);
refreshBtn.addEventListener('click', loadWorkbook);

// ── Restore preferences ───────────────────────────────────
if (localStorage.getItem('rv_theme') === '1') {
  excelTheme = true;
  document.body.classList.add('excel-theme');
  themeBtn.textContent = '🌙 Dark view';
  themeBtn.classList.add('active');
}

// ── Service worker ────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ── Boot ──────────────────────────────────────────────────
loadWorkbook();
</script>
</body>
</html>
